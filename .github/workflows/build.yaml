name: Release library build

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Pre-build devShell
        run: nix build --no-link .#devShells.$(nix eval --impure --raw --expr 'builtins.currentSystem').default
      - name: Build release libraries
        shell: 'nix develop -c bash -e {0}'
        run: make release-all
      - name: Upload release libraries
        uses: actions/upload-artifact@v4
        with:
          name: release-libraries
          path: out/
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download release libraries
        uses: actions/download-artifact@v4
        with:
          name: release-libraries
          path: release-libraries
      - name: Zip release libraries
        run: |
          mkdir -p release-assets
          find release-libraries -mindepth 1 -maxdepth 1 -type d -print0 | while IFS= read -r -d '' dir; do
            name="$(basename "$dir")"
            (cd release-libraries && zip -r "../release-assets/${name}.zip" "$name")
          done
          test -n "$(find release-assets -type f -name '*.zip' -print -quit)"
      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
