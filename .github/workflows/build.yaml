name: Release library build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  check-build:
    name: Check build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build release libraries
        run: nix develop --command make release-all
      - name: Upload release libraries
        uses: actions/upload-artifact@v4
        with:
          name: release-libraries
          path: out/
          if-no-files-found: error
